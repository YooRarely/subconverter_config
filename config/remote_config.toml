version = 4
[custom]
enable_rule_generator = true
overwrite_original_rules = true

add_emoji = true
remove_old_emoji = true



clash_rule_base = "https://raw.githubusercontent.com/YooRarely/subconverter_config/refs/heads/main/config/clash_base.yml"

[[emoji]]
import = "https://raw.githubusercontent.com/YooRarely/subconverter_config/refs/heads/main/config/emoji.toml"




[[custom_groups]]
import = "https://raw.githubusercontent.com/YooRarely/subconverter_config/refs/heads/main/config/country.toml"

# [[rulesets]]
# group = "🚀 节点选择"
# ruleset = "https://raw.githubusercontent.com/YooRarely/subconverter_config/refs/heads/main/rules/Global.list"
# interval = 30

# [[rulesets]]
# group = "DIRECT"
# ruleset = "https://raw.githubusercontent.com/YooRarely/subconverter_config/refs/heads/main/rules/China.list"
# interval = 30

# 1. 拦截广告（可选，极简派如果不在意广告可删此条）
[[rulesets]]
group = "REJECT"
ruleset = "https://raw.githubusercontent.com/YooRarely/subconverter_config/refs/heads/main/rules/default/AdRule.list"

# 2. 局域网与修正（确保本地连接不走代理）
[[rulesets]]
group = "DIRECT"
ruleset = "https://raw.githubusercontent.com/YooRarely/subconverter_config/refs/heads/main/rules/default/LocalAreaNetwork.list"

# 3. 核心分流：所有被墙的国外服务（Google/Twitter/GitHub等）
[[rulesets]]
group = "🚀 节点选择"
ruleset = "https://raw.githubusercontent.com/YooRarely/subconverter_config/refs/heads/main/rules/default/Global.list"

# 4. 国内直连（基于域名和地理位置 IP）
[[rulesets]]
group = "DIRECT"
ruleset = "https://raw.githubusercontent.com/YooRarely/subconverter_config/refs/heads/main/rules/default/China.list"

[[rulesets]]
group = "DIRECT"
ruleset = "[]GEOIP,CN,no-resolve"

# 5. 终极兜底：没被上面命中的全部走主组
[[rulesets]]
group = "🚀 节点选择"
ruleset = "[]FINAL"
